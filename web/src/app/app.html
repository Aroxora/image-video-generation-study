<div class="shell" [class.shell--menu]="menuOpen()">
  <!-- mobile top bar -->
  <div class="topbar">
    <a class="brand brand--mini" routerLink="/" aria-label="Home">
      <span class="brand__mark" aria-hidden="true"></span>
      <span class="brand__name">Erosolar</span>
    </a>
    <button class="topbar__toggle" type="button" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- left rail -->
  <aside class="rail">
    <a class="brand" routerLink="/">
      <span class="brand__mark" aria-hidden="true"></span>
      <span>
        <span class="brand__name">Erosolar</span>
        <span class="brand__sub">image · video generation</span>
      </span>
    </a>

    <nav class="nav" aria-label="Chapters">
      @for (s of sections; track s.slug) {
        <a class="nav__item"
           [routerLink]="'/' + s.slug"
           routerLinkActive="nav__item--active"
           [routerLinkActiveOptions]="{ exact: s.slug === '' }">
          <span class="nav__no">{{ s.no }}</span>
          <span class="nav__label">{{ s.label }}</span>
        </a>
      }
    </nav>

    <div class="rail__foot">
      <a class="rail__repo" [href]="repo.base" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
        <span>Open the repo ↗</span>
      </a>
      <p class="rail__note">Every page links to the exact PyTorch file that implements it.</p>
    </div>
  </aside>

  <!-- backdrop for mobile menu -->
  <button class="backdrop" type="button" aria-label="Close navigation" (click)="toggleMenu()"></button>

  <!-- content -->
  <main class="content">
    <router-outlet />
  </main>
</div>
